<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VMM Turbo12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>VMM Turbo12</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#f3f2f3;color:#001430;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:14px;-webkit-text-size-adjust:100%;}
input,button,select{font-family:inherit;}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#7c9ac055;border-radius:2px;}

/* ── Colors (CSS vars) ── */
:root{
  --main1:#001430;--aux:#001f4c;--steel:#7c9ac0;
  --gold:#dac484;--golddim:rgba(218,196,132,0.15);
  --red:#cc0007;--bg:#f3f2f3;--bgsec:#e7e7e7;
  --card:#fff;--border:rgba(0,31,76,0.12);
  --shadow:rgba(0,0,0,0.08);--text:#001430;
  --muted:#5a6e8a;--green:#00c853;
}

/* ── Layout ── */
#topbar{position:fixed;top:0;left:0;right:0;height:56px;z-index:200;
  background:linear-gradient(135deg,var(--main1),var(--aux));
  box-shadow:0 2px 12px rgba(0,20,48,0.3);
  display:flex;align-items:center;gap:10px;padding:0 14px;}
#sidebar{position:fixed;top:56px;left:0;bottom:0;width:220px;z-index:150;
  background:linear-gradient(180deg,var(--main1),#001a38);
  border-right:1px solid rgba(218,196,132,0.12);
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  transition:transform .26s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;}
#sidebar.closed{transform:translateX(-220px);}
#overlay{display:none;position:fixed;top:56px;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.45);z-index:149;}
#overlay.on{display:block;}
#main{margin-top:56px;transition:margin-left .26s cubic-bezier(.4,0,.2,1);min-height:calc(100vh - 56px);}
#main.shifted{margin-left:220px;}
#content{max-width:1100px;margin:0 auto;padding:24px 20px 80px;}

/* ── Topbar pieces ── */
#toggle-btn{width:40px;height:40px;border-radius:9px;border:none;cursor:pointer;
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  transition:background .2s;flex-shrink:0;}
#toggle-btn.open{background:rgba(218,196,132,0.2);color:#dac484;}
.topbar-logo{width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--steel),var(--main1));
  border:2px solid rgba(218,196,132,0.4);
  display:flex;align-items:center;justify-content:center;}
.topbar-brand{line-height:1.1;}
.topbar-brand b{font-size:15px;font-weight:800;letter-spacing:-.01em;}
.topbar-brand span{font-size:9px;color:rgba(218,196,132,0.6);letter-spacing:.1em;text-transform:uppercase;display:block;}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.milhas-badge{padding:5px 10px;border-radius:20px;background:rgba(124,154,192,0.2);
  border:1px solid rgba(124,154,192,0.4);font-size:11px;font-weight:600;
  color:#dac484;white-space:nowrap;}
#save-all-btn{padding:6px 12px;border-radius:8px;border:1px solid rgba(218,196,132,0.5);
  background:rgba(218,196,132,0.15);color:#dac484;font-size:11px;font-weight:600;
  cursor:pointer;white-space:nowrap;}

/* ── Sidebar ── */
.side-header{padding:14px 14px 12px;border-bottom:1px solid rgba(255,255,255,0.06);}
.side-total-lbl{font-size:9px;color:rgba(218,196,132,0.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.side-total-val{font-size:20px;font-weight:800;color:#dac484;}
.side-save-mob{display:none;margin-top:10px;width:100%;padding:8px 0;border-radius:8px;
  border:1px solid rgba(218,196,132,0.5);background:rgba(218,196,132,0.15);
  color:#dac484;font-size:12px;font-weight:600;cursor:pointer;}
.side-group-lbl{font-size:9px;font-weight:700;color:rgba(124,154,192,0.7);
  letter-spacing:.12em;text-transform:uppercase;padding:10px 14px 4px;}
.side-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;
  border:none;border-left:3px solid transparent;cursor:pointer;
  background:transparent;color:rgba(255,255,255,0.65);
  font-size:13px;font-weight:400;text-align:left;white-space:nowrap;
  transition:background .15s,color .15s;min-height:44px;}
.side-btn.active{background:linear-gradient(90deg,rgba(218,196,132,0.15),rgba(218,196,132,0.05));
  border-left-color:#dac484;color:#dac484;font-weight:600;}
.side-btn:hover:not(.active){background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.9);}
.side-btn .ico{font-size:16px;flex-shrink:0;}
.side-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,0.06);
  font-size:9px;color:rgba(255,255,255,0.2);line-height:1.6;margin-top:auto;}

/* ── Cards & Typography ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;box-shadow:0 2px 8px var(--shadow);margin-bottom:0;}
.sec-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--main1),var(--aux));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 2px 8px var(--shadow);}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.sec-title{font-size:16px;font-weight:700;color:var(--main1);}
.sec-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.sec-line{height:3px;border-radius:2px;margin-bottom:20px;margin-left:50px;}

.field-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:5px;}
.field-wrap{display:flex;align-items:center;background:var(--bg);border-radius:8px;
  border:1.5px solid var(--border);overflow:hidden;transition:border .15s;margin-bottom:13px;}
.field-wrap:focus-within{border-color:var(--steel);}
.field-fix{padding:9px 10px;color:var(--muted);font-size:12px;background:var(--bgsec);
  border-right:1px solid var(--border);white-space:nowrap;font-weight:500;}
.field-fix.suf{border-right:none;border-left:1px solid var(--border);}
.field-input{flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-size:14px;font-weight:500;padding:9px 12px;}
/* iOS: prevent zoom on focus */
@media(max-width:768px){.field-input{font-size:16px;}}

.result-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);}
.result-lbl{font-size:12px;color:var(--muted);font-weight:500;}
.result-val{font-size:13px;font-weight:600;color:var(--aux);}
.result-val.hi{font-size:16px;font-weight:700;}

.pill{display:inline-block;border-radius:20px;padding:3px 12px;
  font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}

.big-stat{text-align:center;padding:16px 14px;border-radius:12px;
  background:var(--card);border:1px solid var(--border);
  box-shadow:0 2px 8px var(--shadow);position:relative;overflow:hidden;}
.big-stat-ico{position:absolute;top:8px;right:10px;font-size:28px;opacity:.06;}
.big-stat-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.07em;
  text-transform:uppercase;margin-bottom:6px;}
.big-stat-val{font-size:24px;font-weight:800;line-height:1;}
.big-stat-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* ── Action Bar ── */
.act-bar{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:18px;
  padding:10px 14px;background:var(--card);border-radius:10px;
  border:1px solid var(--border);box-shadow:0 1px 4px var(--shadow);}
.act-bar-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.05em;
  text-transform:uppercase;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.act-bar-btns{display:flex;gap:8px;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:5px;border:none;cursor:pointer;
  border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;
  font-family:inherit;transition:filter .15s,transform .1s;min-height:36px;}
.btn:active{transform:scale(.97);}
.btn-save{background:linear-gradient(135deg,var(--main1),var(--aux));color:#dac484;}
.btn-clear{background:rgba(204,0,7,0.1);color:var(--red);border:1px solid rgba(204,0,7,0.3);}

/* ── Grids ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid-3b{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:900px){
  .grid-3{grid-template-columns:1fr 1fr;}
  .grid-3b{grid-template-columns:1fr 1fr;}
}
@media(max-width:640px){
  .grid-2,.grid-3,.grid-3b{grid-template-columns:1fr;}
  #save-all-btn{display:none;}
  .side-save-mob{display:block;}
  .topbar-brand span{display:none;}
  #content{padding:14px 12px 80px;}
}

/* ── Bar chart (dashboard) ── */
.prog-bar-wrap{background:var(--bgsec);border-radius:4px;height:6px;overflow:hidden;margin-top:4px;}
.prog-bar{height:100%;border-radius:4px;transition:width .5s ease;}

/* ── Table inputs ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{padding:7px 8px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;
  background:var(--bgsec);text-transform:uppercase;letter-spacing:.05em;}
.tbl th.r{text-align:right;}
.tbl td{padding:4px 6px;border-bottom:1px solid var(--border);}
.tbl td.lbl{padding:6px 8px;font-weight:500;color:var(--text);}
.tbl tr:nth-child(even) td{background:rgba(231,231,231,0.4);}
.tbl tfoot td{padding:7px 8px;background:rgba(218,196,132,0.12);
  border-top:2px solid rgba(218,196,132,0.4);font-weight:700;font-size:12px;}
.cell-input{width:100%;text-align:right;background:transparent;
  border:1px solid var(--border);border-radius:5px;padding:4px 7px;
  font-family:inherit;font-size:12px;color:var(--text);outline:none;
  transition:border .15s;}
.cell-input:focus{border-color:var(--steel);}
@media(max-width:640px){.cell-input,.field-input{font-size:16px;}}

/* ── Toast ── */
#toast{position:fixed;bottom:20px;right:14px;z-index:9999;
  padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);display:none;align-items:center;gap:8px;
  max-width:calc(100vw - 28px);animation:tIn .25s ease;}
#toast.on{display:flex;}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Footer ── */
#footer{background:linear-gradient(135deg,var(--main1),var(--aux));
  padding:14px 16px;text-align:center;}

/* === Saldos Programas de Fidelidade === */
.loyalty-section{margin-top:24px;}
.loyalty-section-title{font-size:11px;font-weight:700;color:var(--steel);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.loyalty-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.loyalty-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:6px;}
.loyalty-card-header{display:flex;align-items:center;gap:8px;}
.loyalty-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.loyalty-card-name{font-size:12px;font-weight:700;color:var(--text);}
.loyalty-card-balance{font-size:22px;font-weight:700;color:var(--text);}
.loyalty-card-label{font-size:10px;color:var(--muted);font-weight:500;}
.loyalty-card-input{display:flex;flex-direction:column;gap:4px;margin-top:2px;}
.loyalty-card-input label{font-size:10px;color:var(--muted);font-weight:600;margin-top:4px;}
.loyalty-card-input input{background:var(--bgsec);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--text);width:100%;font-family:inherit;box-sizing:border-box;}
.loyalty-card-input input:focus{outline:none;border-color:var(--steel);}
.loyalty-card-actions{margin-top:6px;}
.loyalty-btn-login{display:block;background:var(--aux);color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;transition:opacity .2s;}
.loyalty-btn-login:hover{opacity:.82;color:#fff;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">

}

// ─── Utils (defined FIRST — Safari iOS requires functions before use) ───
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
function deepMerge(base, over) {
  var r = deepClone(base);
  for (var k in over) {
    if (over.hasOwnProperty(k)) {
      if (typeof over[k] === 'object' && over[k] !== null && !Array.isArray(over[k]) &&
          typeof r[k] === 'object' && r[k] !== null) {
        r[k] = deepMerge(r[k], over[k]);
      } else {
        r[k] = over[k];
      }
    }
  }
  return r;
}
function lsSave(d) { try { localStorage.setItem('vmm_t12', JSON.stringify(d)); } catch(e){} }
function lsLoad()  { try { var r=localStorage.getItem('vmm_t12'); return r?JSON.parse(r):null; } catch(e){ return null; } }

// ─── Number formatting (manual — toLocaleString unreliable on iOS local files) ───
function fmtNum(v, decimals) {
  if (typeof v !== 'number' || isNaN(v) || !isFinite(v)) return '—';
  decimals = decimals || 0;
  var neg = v < 0;
  var abs = Math.abs(v);
  var factor = Math.pow(10, decimals);
  var rounded = Math.round(abs * factor) / factor;
  var parts = rounded.toFixed(decimals).split('.');
  // add thousands separator (pt-BR style: dot)
  var intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  var result = intPart + (decimals > 0 ? ',' + parts[1] : '');
  return (neg ? '-' : '') + result;
}

function fmt(v, d) {
  if (typeof v !== 'number' || isNaN(v)) return '—';
  return fmtNum(v, d || 0);
}
function fmtR(v, d) {
  if (typeof v !== 'number' || isNaN(v)) return '—';
  d = (d === undefined) ? 2 : d;
  return 'R$ ' + fmtNum(v, d);
}
function numToDisplay(v) {
  if (!v && v !== 0) return '';
  if (v === 0) return '';
  // show decimals only if needed
  var s = String(parseFloat(v));
  var dec = s.indexOf('.') >= 0 ? s.split('.')[1].length : 0;
  dec = Math.min(dec, 6);
  return fmtNum(v, dec);
}
function pct(v) { return fmt(v*100, 2) + '%'; }

// parse string → number (supports pt-BR 1.000,50 and plain 1000.50)
function parseNum(s) {
  if (s === '' || s === null || s === undefined) return 0;
  s = String(s).trim();
  if (s === '' || s === '-') return 0;
  var hasComma = s.indexOf(',') >= 0;
  var dotCount = (s.match(/\./g)||[]).length;
  var norm;
  if (hasComma) {
    norm = s.replace(/\./g,'').replace(',','.');
  } else if (dotCount > 1) {
    norm = s.replace(/\./g,'');
  } else {
    norm = s;
  }
  return parseFloat(norm) || 0;
}
function pctToDisplay(v) {
  if (!v) return '';
  return String(parseFloat((v*100).toPrecision(7)));
}

// ─── Input helpers ───
// Creates a number input that displays formatted on blur
function numField(label, val, onChange, prefix, suffix) {
  var id = 'f_' + Math.random().toString(36).substr(2,8);
  var isBlurred = true;
  var html = '<div class="field-lbl">' + label + '</div>';
  html += '<div class="field-wrap"' + ' id="fw_'+id+'">';
  if (prefix) html += '<div class="field-fix">' + prefix + '</div>';
  html += '<input class="field-input" type="text" inputmode="decimal" id="' + id + '" value="' + numToDisplay(val) + '" placeholder="0">';
  if (suffix) html += '<div class="field-fix suf">' + suffix + '</div>';
  html += '</div>';

  setTimeout(function() {
    var inp = document.getElementById(id);
    if (!inp) return;
    inp.addEventListener('focus', function() {
      isBlurred = false;
      var n = parseNum(this.value);
      this.value = n === 0 ? '' : String(parseFloat(n));
    });
    inp.addEventListener('input', function() {
      var raw = this.value;
      var n = parseNum(raw);
      onChange(n);
      updateResults();
    });
    inp.addEventListener('blur', function() {
      isBlurred = true;
      var n = parseNum(this.value);
      onChange(n);
      this.value = numToDisplay(n);
      updateResults();
    });
  }, 0);

  return html;
}

function pctField(label, val, onChange) {
  var id = 'f_' + Math.random().toString(36).substr(2,8);
  var displayVal = pctToDisplay(val);
  var html = '<div class="field-lbl">' + label + '</div>';
  html += '<div class="field-wrap">';
  html += '<input class="field-input" type="text" inputmode="decimal" id="' + id + '" value="' + displayVal + '" placeholder="0">';
  html += '<div class="field-fix suf">%</div>';
  html += '</div>';

  setTimeout(function() {
    var inp = document.getElementById(id);
    if (!inp) return;
    inp.addEventListener('input', function() {
      var n = parseNum(this.value.replace(',','.'));
      onChange(n / 100);
      updateResults();
    });
    inp.addEventListener('blur', function() {
      var n = parseNum(this.value.replace(',','.'));
      onChange(n / 100);
      this.value = pctToDisplay(n/100);
      updateResults();
    });
  }, 0);

  return html;
}

function cellInput(val, onChange) {
  var id = 'c_' + Math.random().toString(36).substr(2,8);
  var html = '<input class="cell-input" type="text" inputmode="decimal" id="' + id + '" value="' + numToDisplay(val) + '" placeholder="0">';
  setTimeout(function() {
    var inp = document.getElementById(id);
    if (!inp) return;
    inp.addEventListener('focus', function() {
      var n = parseNum(this.value);
      this.value = n === 0 ? '' : String(parseFloat(n));
    });
    inp.addEventListener('input', function() {
      onChange(parseNum(this.value));
      updateResults();
    });
    inp.addEventListener('blur', function() {
      var n = parseNum(this.value);
      onChange(n);
      this.value = numToDisplay(n);
      updateResults();
    });
  }, 0);
  return html;
}

  // (inputs preserve their own DOM values via closure)
  renderResults(tab);
}

// ─── Navigation ───
function navigate(id) {
  currentTab = id;
  // Update sidebar active state
  var btns = document.querySelectorAll('.side-btn');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].dataset.id === id) {
      btns[i].classList.add('active');
    } else {
      btns[i].classList.remove('active');
    }
  }
  // Close sidebar on mobile
  if (window.innerWidth <= 900) closeSidebar();
  // Render content
  document.getElementById('content').innerHTML = renderTab(id);
  updateTotals();
}

// ─── Render sidebar ───
function renderSidebar() {
  var nav = document.getElementById('side-nav');
  var html = '';
  TABS.forEach(function(group) {
    html += '<div class="side-group-lbl">' + group.g + '</div>';
    group.items.forEach(function(t) {
      html += '<button class="side-btn' + (t.id === currentTab ? ' active' : '') + '" data-id="' + t.id + '" onclick="navigate(\'' + t.id + '\')">' +
        '<span class="ico">' + t.ico + '</span>' + t.lbl + '</button>';
    });
  });
  nav.innerHTML = html;
}

// ─── Render results only (called on input change) ───
function renderResults(tab) {
  var el = document.getElementById('results-'+tab);
  if (!el) return;
  el.innerHTML = calcResults(tab);
  updateTotals();
}

function calcResults(tab) {
  var d = S[tab];
  if (!d) return '';
  var html = '';

  if (tab === 'milheiro') {
    var custo = d.qtd > 0 ? (d.valorPontos / d.qtd) * 1000 : 0;
    var q = custo < 18 ? ['Excelente',C.green] : custo < 28 ? ['Bom',C.steel] : custo < 40 ? ['Razoável','#f39c12'] : ['Caro',C.red];
    html = resultRow('Custo do Milheiro', fmtR(custo), true, C.steel);
    html += '<div style="margin-top:14px;text-align:center">' + pill(q[0], q[1]) + '</div>';
    html += '<div style="margin-top:12px;padding:12px;background:rgba(0,20,48,0.06);border-radius:10px;font-size:11px;color:var(--muted);line-height:1.8;text-align:center">' +
      '<b style="color:#dac484">Livelo</b> ~R$35 &nbsp;·&nbsp; <b style="color:#FF6B00">Smiles</b> ~R$15 &nbsp;·&nbsp; <b style="color:#0057B8">Azul</b> ~R$14</div>';
  }
  else if (tab === 'cartao') {
    var ptsA = d.conv > 0 ? (d.fatura / d.dolar) / d.conv : 0;
    var gastoNec = d.milhas * d.conv2 * d.dolar2;
    html = resultRow('Pontos creditados', fmt(ptsA, 0), true, C.steel);
    html += '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">';
    html += resultRow('Gasto necessário no cartão', fmtR(gastoNec), true, C.gold);
  }
  else if (tab === 'anuidade') {
    var ga = d.gastoMensal * d.meses;
    var em$ = d.cotDolar > 0 ? ga / d.cotDolar : 0;
    var pts = d.convCart > 0 ? ga / d.convCart : 0;
    var ptsB = pts * (1 + d.transBonus);
    html = resultRow('Gasto anual', fmtR(ga)) +
      resultRow('Valor em dólar', '$ ' + fmt(em$, 0)) +
      resultRow('Pontos (base)', fmt(pts, 0)) +
      resultRow('Pontos com bônus', fmt(ptsB, 0), true);
  }
  else if (tab === 'apps') {
    var taxa2 = d.boleto * d.taxa;
    var em2 = d.dolar > 0 ? taxa2 / d.dolar : 0;
    var qp = d.fator > 0 ? em2 / d.fator : 0;
    var milh = qp * (1 + d.bonus);
    var mEf = milh > 0 ? (taxa2 / milh) * 1000 : 0;
    var ok = mEf > 0 && mEf < 35;
    html = resultRow('Taxa', fmtR(taxa2)) +
      resultRow('Em dólar', '$ ' + fmt(em2, 2)) +
      resultRow('Pontos', fmt(qp, 0)) +
      resultRow('Milhas (c/ bônus)', fmt(milh, 0)) +
      resultRow('Custo efetivo/mil', fmtR(mEf), true, ok ? C.green : C.red);
    if (mEf > 0) html += '<div style="margin-top:12px;padding:10px;border-radius:8px;text-align:center;background:' + (ok?'rgba(0,200,83,0.08)':'rgba(204,0,7,0.08)') + ';border:1px solid ' + (ok?C.green:C.red) + '44;color:' + (ok?C.green:C.red) + ';font-weight:600;font-size:13px">' + (ok?'✅ Vale a pena!':'⚠️ Verifique se compensa') + '</div>';
  }
  else if (tab === 'clubes') {
    var custo2 = d.mensalidade * d.meses;
    var ps = d.pontosMes * d.meses + d.bonusAdesao;
    var m1 = ps > 0 ? (custo2/ps)*1000 : 0;
    var pc = ps * (1 + d.bonusTransf);
    var m2 = pc > 0 ? (custo2/pc)*1000 : 0;
    html = resultRow('Custo total', fmtR(custo2)) +
      resultRow('Pontos sem bônus', fmt(ps)) +
      resultRow('Custo milheiro (sem bônus)', fmtR(m1)) +
      resultRow('Pontos com transf.', fmt(pc)) +
      resultRow('Custo final / mil', fmtR(m2), true);
    if (m2 > 0) html += '<div style="margin-top:10px">' + pill(m2<15?'Excelente':m2<25?'Bom':'Elevado', m2<15?C.green:m2<25?C.steel:C.red) + '</div>';
  }
  else if (tab === 'upgrade') {
    var c1=d.m1*d.mo1, p1=d.p1*d.mo1+d.b1;
    var c2=d.m2*d.mo2, p2=d.p2*d.mo2+d.b2;
    var cT=c1+c2+d.anuidade, pT=p1+p2;
    var mT=pT>0?(cT/pT)*1000:0;
    html = '<div class="grid-3" style="gap:10px;margin-top:8px">' +
      bigStat('Custo Total', fmtR(cT), '💸', C.red) +
      bigStat('Pontos Totais', fmt(pT), '🎯', C.green) +
      bigStat('Custo/Mil', fmtR(mT), '💰', C.gold) +
      '</div>';
  }
  else if (tab === 'compraBonus') {
    var pp = d.dolar > 0 ? (d.valor/d.dolar)*d.ptsPorReal : 0;
    var pc2 = d.fator > 0 ? d.valor/d.fator : 0;
    var base = pp + pc2;
    var total2 = d.transBonus > 0 ? base*(1+d.transBonus) : base;
    html = resultRow('Pontos pelo programa', fmt(pp,0)) +
      resultRow('Pontos pelo cartão', fmt(pc2,0)) +
      resultRow('Total base', fmt(base,0)) +
      resultRow('Total com bônus', fmt(total2,0), true);

  else if (tab === 'transf') {
    var bA = d.pontosCartao * d.percMilhas;
    var tA = d.pontosCartao + bA;
    var nec = d.percPontos > -1 ? d.milhasDesejadas / (1 + d.percPontos) : 0;
    var bB = nec * d.percPontos;
    html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">' +

        '<div style="font-size:11px;font-weight:700;color:'+C.steel+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Pontos → Milhas</div>' +
        resultRow('Bônus', fmt(bA,0)) + resultRow('Total', fmt(tA,0), true, C.steel) +

        '<div style="font-size:11px;font-weight:700;color:'+C.gold+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Milhas → Pontos</div>' +
        resultRow('Bônus retorno', fmt(bB,0)) + resultRow('Pontos necessários', fmt(nec,0), true, C.gold) +
      '</div></div>';
  }
  else if (tab === 'bumerangue') {
    html = '<div class="grid-3b" style="gap:10px">';
    [[d.pa1,d.pl1,d.pts1,'Estratégia 1',C.steel],[d.pa2,d.pl2,d.pts2,'Estratégia 2',C.gold],[d.pa3,d.pl3,d.pts3,'Estratégia 3',C.main1]].forEach(function(st) {

      html += '<div>' +
        '<div style="font-size:11px;font-weight:700;color:'+st[4]+';margin-bottom:8px">'+st[3]+'</div>' +
        resultRow('Saldo aéreo', fmt(saldo,0)) + resultRow('Retorno Livelo', fmt(retorno,0)) +
        resultRow('Bônus final', bonus>0 ? bonus.toFixed(2)+'×' : '—', true, st[4]) +
        '</div>';
    });
    html += '</div>';
  }
  else if (tab === 'passagem') {
    var cm = (d.milhas*d.custoMil)/1000 + d.taxa;
    var econ = d.valorDin - cm;
    var perc = d.valorDin > 0 ? (econ/d.valorDin)*100 : 0;
    var okP = econ > 0;
    html = resultRow('Custo c/ milhas', fmtR(cm)) +
      resultRow('Valor em dinheiro', fmtR(d.valorDin)) +
      resultRow('Economia', fmtR(econ), true, okP?C.green:C.red);

      html += '<div style="margin-top:14px;padding:16px;border-radius:12px;text-align:center;background:' + (okP?'linear-gradient(135deg,'+C.main1+','+C.aux+')':'rgba(204,0,7,0.08)') + ';border:2px solid '+(okP?C.steel:C.red)+'44">' +
        '<div style="font-size:32px;margin-bottom:6px">'+(okP?'✅':'❌')+'</div>' +
        '<div style="font-size:14px;font-weight:700;color:'+(okP?C.gold:C.red)+'">'+(okP?'Vantajoso emitir!':'Melhor pagar em dinheiro')+'</div>' +
        '<div style="font-size:32px;font-weight:800;color:'+(okP?C.gold:C.red)+';margin-top:4px">'+Math.abs(perc).toFixed(1)+'%</div>' +
        '<div style="font-size:11px;color:'+(okP?'rgba(255,255,255,.6)':'var(--muted)')+'">'+( okP?'de economia':'mais caro')+'</div>' +
        '</div>';
    }
  }
  else if (tab === 'compraPontos') {
    var tC=(d.qtd*d.milh)/1000, sB=d.qtd*(1+d.bonus), cF=sB>0?(tC/sB)*1000:0;
    var qV=d.milh2>0?d.total/(d.milh2/1000):0, sBV=qV*(1+d.bonus2), cFV=qV>0?(d.total/sBV)*1000:0;
    html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">' +
      '<div>' +
        '<div style="font-size:11px;font-weight:700;color:'+C.steel+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Por Quantidade</div>' +
        resultRow('Custo total', fmtR(tC)) + resultRow('Saldo total', fmt(sB,0)) + resultRow('Custo/mil', fmtR(cF), true, C.steel) +
      '</div>' +
      '<div>' +
        '<div style="font-size:11px;font-weight:700;color:'+C.gold+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Por Valor</div>' +
        resultRow('Qtd de pontos', fmt(qV,0)) + resultRow('Saldo total', fmt(sBV,0)) + resultRow('Custo/mil', fmtR(cFV), true, C.gold) +
      '</div></div>';
  }
  else if (tab === 'allAccor') {
    var pAll = d.conv>0 ? d.pontos/d.conv : 0;
    var vEuro = (pAll/1000)*d.valorEuro;
    var eGer = pAll>0 ? ((d.pontos*d.valorPts/1000)/pAll)*d.cotEuro : 0;
    html = resultRow('Pontos ALL', fmt(pAll,0)) + resultRow('Valor total €', '€ '+fmt(vEuro,2)) + resultRow('Valor do Euro gerado', fmtR(eGer), true, C.gold);
  }
  return html;
}

// Override renderResults for minhas tab
function renderResults(tab) {
  if (tab === 'minhas') {
    var m = S.minhas;
    var totalA = 0, totalC = 0;
    PROGS.forEach(function(p){ totalA += (m[p.k]&&m[p.k].a)||0; totalC += ((m[p.k]&&m[p.k].a)||0)*((m[p.k]&&m[p.k].c)||0)/1000; });
    var cG = totalA > 0 ? (totalC/totalA)*1000 : 0;
    var el = document.getElementById('results-minhas');
    if (el) {
      el.innerHTML = bigStat('Total Acumulado', fmt(totalA), '✈️', C.steel, 'milhas / pontos') +
        bigStat('Custo Médio / Mil', fmtR(cG), '💸', C.gold, 'por milheiro') +
        bigStat('Investimento Est.', fmtR(totalC,0), '💰', C.main1, 'total investido');
    }
    PROGS.forEach(function(p) {
      var inv = document.getElementById('inv-'+p.k);
      if (inv) {
        var a = S.minhas[p.k].a||0, c2 = S.minhas[p.k].c||0;
        inv.textContent = fmtR((a*c2)/1000, 0);
      }
    });
    updateTotals();
    return;
  }
  // default: re-render results section
  var el2 = document.getElementById('results-'+tab);
  if (!el2) return;
  el2.innerHTML = calcResults(tab);
  updateTotals();
}

  html += '<thead><tr><th>Mês</th><th class="r">Custo (R$)</th><th class="r">' + (isAereo?'Milhas':'Pontos') + '</th></tr></thead><tbody>';

  MESES.forEach(function(m, i) {
    var row = data[m] || {c:0, a:0};
    html += '<tr><td class="lbl">'+MESES_L[i]+'</td>';
    html += '<td>' + cellInput(row.c, (function(mk, dk, sk){ return function(v){ S[dk][sk][mk].c=v; updateAcumResults(dk); }; })(m, key, secKey)) + '</td>';
    html += '<td>' + cellInput(row.a, (function(mk, dk, sk){ return function(v){ S[dk][sk][mk].a=v; updateAcumResults(dk); }; })(m, key, secKey)) + '</td>';
    html += '</tr>';
  });

  var tC = MESES.reduce(function(s,m){ return s+(data[m]&&data[m].c||0); }, 0);
  var tA = MESES.reduce(function(s,m){ return s+(data[m]&&data[m].a||0); }, 0);
  var med = tA > 0 ? (tC/tA)*1000 : 0;

  html += '</tbody><tfoot><tr>';
  html += '<td>TOTAL</td>';
  html += '<td style="text-align:right;color:'+C.main1+'">'+fmtR(tC)+'</td>';
  html += '<td style="text-align:right;color:'+C.steel+'">'+fmt(tA)+' &nbsp;<span style="color:'+C.gold+'">'+fmtR(med)+'/mil</span></td>';
  html += '</tr></tfoot></table></div></div>';
  return html;
}

function updateAcumResults(key) {
  var el = document.getElementById('acum-results-'+key);
  if (!el) return;
  el.innerHTML = calcAcumResults(key);
  updateTotals();
}

function calcAcumResults(key) {
  var d = S[key];
  var isAereo = (key.indexOf('acum') === 0 && ['acumSmiles','acumAzul','acumLatam','acumIberia','acumTap'].indexOf(key) >= 0);
  var secs = isAereo ? ['clube','bonif','compra'] : ['clubes','bonificadas','compra'];
  var totalA = 0, totalC = 0;
  secs.forEach(function(sec) {
    MESES.forEach(function(m) {
      totalA += (d[sec]&&d[sec][m]&&d[sec][m].a)||0;
      totalC += (d[sec]&&d[sec][m]&&d[sec][m].c)||0;
    });
  });
  var cMed = totalA > 0 ? (totalC/totalA)*1000 : 0;
  var uso = d.uso || 0;
  var saldo = totalA - uso;

  var html = '<div class="grid-3" style="margin-bottom:0">' +
    bigStat('Acúmulo Total', fmt(totalA), '📊', C.steel) +
    bigStat('Custo Médio/Mil', fmtR(cMed), '💸', C.gold) +
    bigStat('Saldo após uso', fmt(saldo), '✈️', saldo>=0?C.green:C.red) +
    '</div>';
  return html;
}

function renderAcum(key) {
  var isAereo = ['acumSmiles','acumAzul','acumLatam','acumIberia','acumTap'].indexOf(key) >= 0;
  var icoMap = {acumLivelo:'🟣',acumEsfera:'💠',acumOutros:'🏦',acumSmiles:'🟠',acumAzul:'🔵',acumLatam:'🔴',acumIberia:'⭐',acumTap:'✈️'};
  var nameMap = {acumLivelo:'Acúmulo LIVELO',acumEsfera:'Acúmulo ESFERA',acumOutros:'Acúmulo OUTROS Bancários',acumSmiles:'Acúmulo SMILES',acumAzul:'Acúmulo AZUL FIDELIDADE',acumLatam:'Acúmulo LATAM PASS',acumIberia:'Acúmulo IBERIA PLUS',acumTap:'Acúmulo TAP MILES&GO'};

  var html = secHead(icoMap[key]||'📊', nameMap[key]||key, 'Lançamentos mensais', C.steel);
  html += actionBar(key);

  if (isAereo) {
    html += acumMonthTable(key, 'clube', 'Clube de Milhas', true);
    html += acumMonthTable(key, 'bonif', 'Compras Bonificadas', true);
    html += acumMonthTable(key, 'compra', 'Compra de Milhas', true);
    html += '<div class="card">' + numField('Uso de milhas no ano', S[key].uso||0, function(v){ S[key].uso=v; updateAcumResults(key); }) + '</div>';
  } else {
    html += acumMonthTable(key, 'clubes', 'Clubes de Pontos', false);
    html += acumMonthTable(key, 'bonificadas', 'Compras Bonificadas', false);
    html += acumMonthTable(key, 'compra', 'Compra de Pontos', false);
  }

  html += '<div id="acum-results-'+key+'" class="grid-3" style="margin-top:14px">' + calcAcumResults(key) + '</div>';
  return html;
}

// ─── Init — DOMContentLoaded + onload fallback for Safari iOS ───
function _init() {
  if (_init._done) return;
  _init._done = true;
  renderSidebar();
  navigate('dashboard');
  updateTotals();

  // Handle resize — desktop sidebar doesn't need overlay
  window.addEventListener('resize', function() {
    if (window.innerWidth > 900) {
      document.getElementById('overlay').classList.remove('on');
      if (sideOpen) document.getElementById('main').classList.add('shifted');
    } else {
      document.getElementById('main').classList.remove('shifted');
      if (sideOpen) document.getElementById('overlay').classList.add('on');
    }
  });
}
document.addEventListener('DOMContentLoaded', _init);
window.addEventListener('load', _init);
// Fallback: run after short delay if neither fired
setTimeout(_init, 100);
</script>
</body>
</html>
